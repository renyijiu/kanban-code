name: Release

on:
  push:
    branches: [main]
  release:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Forks do not inherit RELEASE_PAT. Keep their main-branch CI green while
    # retaining the release-event build job below for fork-owned releases.
    if: github.event_name == 'push' && github.repository == 'langwatch/kanban-code'
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          token: ${{ secrets.RELEASE_PAT }}

  build:
    if: github.event_name == 'release'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve version
        id: meta
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: swift build -c release

      - name: Create app bundle
        run: make app CONFIG=release VERSION=${{ steps.meta.outputs.version }}

      - name: Zip and upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd build
          zip -ry "KanbanCode-${{ steps.meta.outputs.version }}-macos.zip" KanbanCode.app
          cd ..
          gh release upload "${{ steps.meta.outputs.tag }}" \
            "build/KanbanCode-${{ steps.meta.outputs.version }}-macos.zip"
